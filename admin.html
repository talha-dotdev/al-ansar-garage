<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al Ansar Garage — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
    /* Colors */
    --bg-primary:#121212;
    --bg-secondary:#1E1E1E;
    --bg-card:#242424;

    --primary:#FF6B00;
    --primary-dark:#E65C00;
    --primary-light:#FF8A3D;

    --white:#F5F5F5;
    --light:#E6E6E6;
    --gray:#B0B0B0;
    --dark-gray:#7A7A7A;

    --border:#303030;

    --success:#2ECC71;
    --danger:#E74C3C;

    /* Fonts */
    --heading-font:"Barlow Condensed",sans-serif;
    --body-font:"Inter",sans-serif;

    /* Font Sizes */
    --fs-h1:56px;
    --fs-h2:42px;
    --fs-h3:30px;
    --fs-h4:24px;
    --fs-body:17px;
    --fs-small:15px;

    /* Font Weight */
    --fw-normal:400;
    --fw-medium:500;
    --fw-semibold:600;
    --fw-bold:700;
    --fw-extra:800;

    /* Border Radius */
    --radius-sm:8px;
    --radius-md:12px;
    --radius-lg:18px;
    --radius-xl:30px;

    /* Shadows */
    --shadow-sm:0 5px 15px rgba(0,0,0,.15);
    --shadow-md:0 10px 25px rgba(0,0,0,.25);
    --shadow-lg:0 20px 50px rgba(0,0,0,.35);

    /* Container */
    --container:1280px;

    /* Transition */
    --transition:.35s ease;

    /* Z Index */
    --z-modal:1000;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: var(--body-font);
    background: var(--bg-primary);
    color: var(--light);
    font-size: var(--fs-body);
}

a { color: inherit; }

/* ---------- Login screen ---------- */
#loginScreen {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

#loginBox {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 40px 34px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 340px;
    max-width: 100%;
    text-align: center;
}

#loginBox h2 {
    font-family: var(--heading-font);
    font-weight: var(--fw-semibold);
    font-size: var(--fs-h3);
    color: var(--white);
    letter-spacing: .5px;
    margin-bottom: 22px;
}

#loginBox input {
    width: 100%;
    padding: 13px 14px;
    margin: 8px 0 16px;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--white);
    border-radius: var(--radius-sm);
    font-size: var(--fs-body);
    font-family: var(--body-font);
    outline: none;
    transition: border-color var(--transition);
}

#loginBox input:focus { border-color: var(--primary); }

#loginBox button {
    width: 100%;
    padding: 13px;
    background: var(--primary);
    color: var(--white);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-weight: var(--fw-semibold);
    font-size: var(--fs-body);
    transition: background var(--transition);
}

#loginBox button:hover { background: var(--primary-dark); }

#loginError { color: var(--danger); font-size: var(--fs-small); margin-top: 10px; min-height: 18px; }

/* ---------- Dashboard ---------- */
#dashboard {
    display: none;
    padding: 40px 24px;
    max-width: var(--container);
    margin: 0 auto;
}

header.adminHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
    gap: 12px;
}

header.adminHeader h2 {
    font-family: var(--heading-font);
    font-weight: var(--fw-semibold);
    font-size: var(--fs-h3);
    color: var(--white);
    letter-spacing: .5px;
}

header.adminHeader h2 span { color: var(--primary); }

header.adminHeader button {
    padding: 10px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--light);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: var(--body-font);
    font-weight: var(--fw-medium);
    transition: var(--transition);
}

header.adminHeader button:hover { border-color: var(--primary); color: var(--primary-light); }

.tabs { display: flex; gap: 10px; margin-bottom: 24px; }

.tabs button {
    padding: 10px 20px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--gray);
    cursor: pointer;
    border-radius: var(--radius-sm);
    font-family: var(--body-font);
    font-weight: var(--fw-medium);
    transition: var(--transition);
}

.tabs button.active { background: var(--primary); color: var(--white); border-color: var(--primary); }
.tabs button:not(.active):hover { border-color: var(--primary); color: var(--primary-light); }

/* ---------- List view ---------- */
.tableWrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
}

table { width: 100%; border-collapse: collapse; }

th, td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    font-size: var(--fs-small);
}

th {
    background: var(--bg-secondary);
    color: var(--gray);
    font-weight: var(--fw-semibold);
    text-transform: uppercase;
    letter-spacing: .5px;
    font-size: 12px;
}

tbody tr { cursor: pointer; transition: background var(--transition); }
tbody tr:hover { background: rgba(255,107,0,.06); }
tbody tr:last-child td { border-bottom: none; }
td { color: var(--light); }

#emptyState {
    padding: 40px 20px;
    text-align: center;
    color: var(--dark-gray);
    font-size: var(--fs-body);
    display: none;
}

/* ---------- Calendar view ---------- */
#calendarHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
}

#calendarMonthLabel {
    font-family: var(--heading-font);
    font-weight: var(--fw-semibold);
    font-size: var(--fs-h4);
    color: var(--white);
}

#calendarHeader button {
    padding: 8px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--light);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
}

#calendarHeader button:hover { border-color: var(--primary); color: var(--primary-light); }

#calendarWeekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 6px;
}

#calendarWeekdays div {
    text-align: center;
    font-size: 12px;
    color: var(--dark-gray);
    font-weight: var(--fw-semibold);
    text-transform: uppercase;
    letter-spacing: .5px;
}

#calendarGrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }

.dayCell {
    background: var(--bg-card);
    border: 1px solid var(--border);
    min-height: 90px;
    padding: 8px;
    border-radius: var(--radius-sm);
    font-size: 12px;
}

.dayNum { font-weight: var(--fw-semibold); color: var(--gray); margin-bottom: 6px; }

.msgTag {
    background: var(--primary);
    color: var(--white);
    padding: 3px 6px;
    border-radius: 4px;
    margin-top: 3px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.msgTag:hover { background: var(--primary-dark); }

/* ---------- Modal ---------- */
#modalOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    align-items: center;
    justify-content: center;
    z-index: var(--z-modal);
    padding: 20px;
}

#modalBox {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 30px;
    width: 380px;
    max-width: 100%;
    box-shadow: var(--shadow-lg);
}

#modalBox h3 {
    font-family: var(--heading-font);
    font-weight: var(--fw-semibold);
    font-size: var(--fs-h4);
    color: var(--white);
    margin-bottom: 18px;
}

.modalRow { margin-bottom: 12px; font-size: var(--fs-small); }
.modalRow strong { color: var(--gray); font-weight: var(--fw-medium); display: block; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
.modalRow span { color: var(--white); }

.modalActions { display: flex; gap: 10px; margin: 18px 0; }

.modalActions a {
    flex: 1;
    text-align: center;
    padding: 11px;
    border-radius: var(--radius-sm);
    text-decoration: none;
    font-weight: var(--fw-semibold);
    font-size: var(--fs-small);
    transition: var(--transition);
}

#callBtn { background: var(--bg-secondary); color: var(--white); border: 1px solid var(--border); }
#callBtn:hover { border-color: var(--primary); }
#whatsappBtn { background: #25D366; color: #fff; }
#whatsappBtn:hover { filter: brightness(1.1); }

#closeModalBtn {
    width: 100%;
    padding: 11px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--light);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: var(--body-font);
    font-weight: var(--fw-medium);
}

#closeModalBtn:hover { border-color: var(--primary); }

/* ---------- Responsive ---------- */
@media (max-width: 700px) {
    #dashboard { padding: 24px 14px; }
    header.adminHeader { flex-direction: column; align-items: flex-start; }
    .tabs button { flex: 1; text-align: center; }

    table, thead, tbody, th, td, tr { display: block; width: 100%; }
    thead { display: none; }
    tbody tr {
        margin-bottom: 10px;
        border-bottom: 1px solid var(--border);
        padding: 10px 4px;
    }
    tbody td {
        border: none;
        padding: 4px 12px;
        font-size: 13px;
    }
    tbody td::before {
        content: attr(data-label);
        font-weight: var(--fw-semibold);
        display: inline-block;
        width: 80px;
        color: var(--gray);
        font-size: 11px;
        text-transform: uppercase;
    }

    #calendarWeekdays div { font-size: 10px; }
    .dayCell { min-height: 56px; font-size: 10px; padding: 4px; }
    .msgTag { font-size: 9px; padding: 2px 4px; }
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div id="loginBox">
    <h2>Admin Login</h2>
    <input type="password" id="passwordInput" placeholder="Password" onkeydown="if(event.key==='Enter') login()">
    <button onclick="login()">Log In</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header class="adminHeader">
    <h2>Al Ansar <span>Garage</span> — Admin</h2>
    <button onclick="logout()">Log Out</button>
  </header>

  <div class="tabs">
    <button id="listTabBtn" class="active" onclick="showTab('list')">List View</button>
    <button id="calTabBtn" onclick="showTab('calendar')">Calendar View</button>
  </div>

  <div id="listView">
    <div class="tableWrap">
      <table>
        <thead>
          <tr><th>Name</th><th>Phone</th><th>Subject</th><th>Received</th><th>Email</th></tr>
        </thead>
        <tbody id="msgTableBody"></tbody>
      </table>
      <div id="emptyState">No messages yet.</div>
    </div>
  </div>

  <div id="calendarView" style="display:none;">
    <div id="calendarHeader">
      <button onclick="changeMonth(-1)">&larr; Prev</button>
      <h3 id="calendarMonthLabel"></h3>
      <button onclick="changeMonth(1)">Next &rarr;</button>
    </div>
    <div id="calendarWeekdays">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    <div id="calendarGrid"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modalOverlay">
  <div id="modalBox">
    <h3>Message Details</h3>
    <input type="hidden" id="modalId">
    <div class="modalRow"><strong>Name</strong><span id="modalName"></span></div>
    <div class="modalRow"><strong>Phone</strong><span id="modalPhone"></span></div>
    <div class="modalRow"><strong>Subject</strong><span id="modalService"></span></div>
    <div class="modalRow"><strong>Received</strong><span id="modalDate"></span></div>
    <div class="modalRow"><strong>Message</strong><span id="modalNotes"></span></div>

    <div class="modalActions">
      <a id="callBtn" href="#">Call</a>
      <a id="whatsappBtn" href="#" target="_blank">WhatsApp</a>
    </div>

    <button id="closeModalBtn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const API_BASE = "https://al-ansar-garage.vercel.app/api";

let token = localStorage.getItem("adminToken") || null;
let contacts = [];
let currentMonth = new Date();

// ---- LOGIN ----
async function login() {
  const password = document.getElementById("passwordInput").value;
  const errorEl = document.getElementById("loginError");
  errorEl.textContent = "";

  try {
    const res = await fetch(`${API_BASE}/admin/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password })
    });
    const data = await res.json();

    if (!res.ok) {
      errorEl.textContent = data.error || "Login failed.";
      return;
    }

    token = data.token;
    localStorage.setItem("adminToken", token);
    enterDashboard();
  } catch (err) {
    errorEl.textContent = "Could not reach server. Try again.";
  }
}

function logout() {
  localStorage.removeItem("adminToken");
  token = null;
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("loginScreen").style.display = "flex";
}

window.addEventListener("DOMContentLoaded", () => {
  if (token) enterDashboard();
});

async function enterDashboard() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  await loadContacts();
  renderList();
  renderCalendar();
}

// ---- FETCH CONTACT MESSAGES ----
async function loadContacts() {
  try {
    const res = await fetch(`${API_BASE}/contact`, {
      headers: { Authorization: `Bearer ${token}` }
    });

    if (res.status === 401) {
      logout();
      return;
    }

    contacts = await res.json();
  } catch (err) {
    console.error("Failed to load contact messages", err);
  }
}

// ---- TABS ----
function showTab(tab) {
  document.getElementById("listTabBtn").classList.toggle("active", tab === "list");
  document.getElementById("calTabBtn").classList.toggle("active", tab === "calendar");
  document.getElementById("listView").style.display = tab === "list" ? "block" : "none";
  document.getElementById("calendarView").style.display = tab === "calendar" ? "block" : "none";
}

// ---- LIST VIEW ----
function renderList() {
  const tbody = document.getElementById("msgTableBody");
  const emptyState = document.getElementById("emptyState");
  tbody.innerHTML = "";

  if (!contacts.length) {
    emptyState.style.display = "block";
    return;
  }
  emptyState.style.display = "none";

  const sorted = [...contacts].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  sorted.forEach(c => {
    const row = document.createElement("tr");
    const dateStr = c.createdAt ? new Date(c.createdAt).toLocaleString() : "-";
    row.innerHTML = `
      <td data-label="Name">${c.name || ""}</td>
      <td data-label="Phone">${c.phone || "-"}</td>
      <td data-label="Subject">${c.subject || "General Inquiry"}</td>
      <td data-label="Received">${dateStr}</td>
      <td data-label="Email">${c.email || "-"}</td>
    `;
    row.addEventListener("click", () => openContactModal(c._id));
    tbody.appendChild(row);
  });
}

// ---- CALENDAR VIEW (grouped by createdAt) ----
function changeMonth(delta) {
  currentMonth.setMonth(currentMonth.getMonth() + delta);
  renderCalendar();
}

function renderCalendar() {
  const grid = document.getElementById("calendarGrid");
  const label = document.getElementById("calendarMonthLabel");
  grid.innerHTML = "";

  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  label.textContent = currentMonth.toLocaleDateString("en-US", { month: "long", year: "numeric" });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    grid.appendChild(document.createElement("div"));
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const cell = document.createElement("div");
    cell.className = "dayCell";

    const dayContacts = contacts.filter(c => {
      if (!c.createdAt) return false;
      const d = new Date(c.createdAt);
      return d.getFullYear() === year && d.getMonth() === month && d.getDate() === day;
    });

    let html = `<div class="dayNum">${day}</div>`;
    dayContacts.forEach(c => {
      html += `<div class="msgTag" data-id="${c._id}">${c.name || "Message"}</div>`;
    });

    cell.innerHTML = html;
    grid.appendChild(cell);
  }

  grid.querySelectorAll(".msgTag").forEach(tag => {
    tag.addEventListener("click", (e) => {
      e.stopPropagation();
      openContactModal(tag.dataset.id);
    });
  });
}

// ---- MODAL: view details + contact links ----
function openContactModal(id) {
  const c = contacts.find(x => x._id === id);
  if (!c) return;

  document.getElementById("modalName").textContent = c.name || "-";
  document.getElementById("modalPhone").textContent = c.phone || "Not provided";
  document.getElementById("modalService").textContent = c.subject || "General Inquiry";
  document.getElementById("modalDate").textContent = c.createdAt ? new Date(c.createdAt).toLocaleString() : "-";
  document.getElementById("modalNotes").textContent = c.message || "-";

  const cleanPhone = (c.phone || "").replace(/[^0-9+]/g, "");
  const callBtn = document.getElementById("callBtn");
  const waBtn = document.getElementById("whatsappBtn");

  if (cleanPhone) {
    callBtn.href = `tel:${cleanPhone}`;
    callBtn.style.pointerEvents = "auto";
    callBtn.style.opacity = "1";
    waBtn.href = `https://wa.me/${cleanPhone.replace("+", "")}`;
    waBtn.style.pointerEvents = "auto";
    waBtn.style.opacity = "1";
  } else {
    callBtn.href = "#";
    callBtn.style.pointerEvents = "none";
    callBtn.style.opacity = "0.4";
    waBtn.href = "#";
    waBtn.style.pointerEvents = "none";
    waBtn.style.opacity = "0.4";
  }

  document.getElementById("modalOverlay").style.display = "flex";
}

function closeModal() {
  document.getElementById("modalOverlay").style.display = "none";
}
</script>
</body>
</html>
